<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DECA Sentrio</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <span class="navbar-brand">DECA Sentrio</span>
    <div class="navbar-center">
      <button class="nav-icon-btn" title="Home">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </button>
      <button class="nav-icon-btn" title="Portal">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 16H7v-2h10v2zm0-4H7v-2h10v2zm0-4H7V8h10v2z"/>
        </svg>
      </button>
    </div>
    <div class="navbar-right">
      <button class="btn-outline">LOGIN</button>
      <button class="btn-outline">REGISTER</button>
    </div>
  </nav>

  <div class="main-wrapper">
    <aside class="sidebar">
      <button class="sidebar-item active">System Introduction</button>
      <button class="sidebar-item">Office Hours</button>
      <button class="sidebar-item">About DECA Portal</button>
      <button class="sidebar-item">Available Offices</button>
      <button class="sidebar-item">Available Services</button>
      <button class="sidebar-item">Contact Information</button>
    </aside>

    <main class="content-area">
      <div class="welcome-bar">
        <div class="avatar-circle">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </div>
        <div class="welcome-text">Welcome, guest!</div>
      </div>
      <div class="img-placeholder"></div>
    </main>
  </div>

  <div class="mobile-bottom-nav">
    <button class="nav-icon-btn" title="Home">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;fill:#fff;">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </button>
    <button class="nav-icon-btn" title="Portal">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;fill:#fff;">
        <path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 16H7v-2h10v2zm0-4H7v-2h10v2zm0-4H7V8h10v2z"/>
      </svg>
    </button>
    <button class="btn-outline">LOGIN</button>
    <button class="btn-outline">REGISTER</button>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
